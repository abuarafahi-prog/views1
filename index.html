<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViewCounter Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --card: #111; --border: #222;
    --accent: #00ff88; --accent2: #ff3c6e; --text: #e8e8e8; --muted: #555;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem 1rem;
  }
  .wrapper { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 1.25rem; }
  header { text-align: center; }
  .logo {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 10vw, 5rem);
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent), #00ccff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .tagline { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.25rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1.5rem 1.75rem; }
  .label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  input {
    width: 100%; background: #0a0a0a; border: 1px solid var(--border);
    color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.78rem;
    padding: 0.7rem 0.9rem; border-radius: 3px; outline: none; transition: border-color 0.2s; margin-bottom: 0.9rem;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .row { display: flex; gap: 0.75rem; }
  .row > div { flex: 1; }
  .btn {
    width: 100%; background: var(--accent); color: #000; border: none;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; letter-spacing: 0.1em;
    padding: 0.85rem; border-radius: 3px; cursor: pointer; transition: box-shadow 0.2s, transform 0.1s;
  }
  .btn:hover { box-shadow: 0 0 24px rgba(0,255,136,0.4); }
  .btn:active { transform: scale(0.98); }
  .btn.stop { background: var(--accent2); }
  .status { font-size: 0.65rem; text-align: center; color: var(--muted); margin-top: 0.6rem; min-height: 1em; }
  .status.ok { color: var(--accent); } .status.err { color: var(--accent2); } .status.warn { color: #ffaa00; }
  .big-number {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(5rem, 20vw, 9rem);
    color: var(--accent); text-align: center; line-height: 1; transition: color 0.08s;
  }
  .big-number.flash { color: #fff; }
  .counter-label { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); text-align: center; margin-top: 0.4rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-top: 1.25rem; }
  .stat-box { background: #0a0a0a; border: 1px solid var(--border); border-radius: 3px; padding: 0.85rem; text-align: center; }
  .stat-label { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); }
  .stat-value.red { color: var(--accent2); }
  .progress-wrap { background: #0a0a0a; border: 1px solid var(--border); border-radius: 3px; height: 5px; overflow: hidden; margin-top: 1rem; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #00ccff); width: 0%; transition: width 0.15s; border-radius: 3px; }
  .log-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem 1.5rem; max-height: 220px; overflow-y: auto; display: none; }
  .log-card.visible { display: block; }
  .log-card::-webkit-scrollbar { width: 4px; }
  .log-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-entry { font-size: 0.6rem; color: var(--muted); padding: 0.25rem 0; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; gap: 1rem; }
  .log-entry:last-child { border-bottom: none; }
  .log-ok { color: var(--accent); } .log-err { color: var(--accent2); } .log-warn { color: #ffaa00; } .log-ts { color: #333; white-space: nowrap; }
  .badge { display: inline-block; font-size: 0.5rem; background: #1a1a1a; border: 1px solid var(--border); border-radius: 2px; padding: 0.1rem 0.35rem; color: var(--accent); margin-left: 0.3rem; }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">ViewCounter Pro</div>
    <div class="tagline">Advanced · Auto-Method · Multi-Proxy</div>
  </header>

  <div class="card">
    <div class="label">Target URL</div>
    <input type="url" id="urlInput" placeholder="https://professor-server.com/count" />
    <div class="row">
      <div>
        <div class="label">Number of Views</div>
        <input type="number" id="countInput" min="1" max="99999" value="100" />
      </div>
      <div>
        <div class="label">Delay (ms)</div>
        <input type="number" id="delayInput" min="100" max="10000" value="300" />
      </div>
    </div>
    <button class="btn" id="mainBtn" onclick="toggle()">⚡ SEND VIEWS</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <div class="card" id="statsCard" style="display:none">
    <div class="big-number" id="bigNumber">0</div>
    <div class="counter-label">Views Sent</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-label">Delivered</div><div class="stat-value" id="successVal">0</div></div>
      <div class="stat-box"><div class="stat-label">Failed</div><div class="stat-value red" id="failVal">0</div></div>
      <div class="stat-box"><div class="stat-label">Rate/sec</div><div class="stat-value" id="rateVal">0</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="log-card" id="logCard">
    <div class="label" style="margin-bottom:0.6rem">Live Request Log</div>
    <div id="logEntries"></div>
  </div>

</div>

<script>
  let running = false, abortFlag = false;
  let sent = 0, success = 0, failed = 0, target = 0, startTime = null;
  let bestMethod = null;

  const PROXIES = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
    u => `https://proxy.cors.sh/${u}`,
    u => `https://cors-anywhere.herokuapp.com/${u}`,
  ];

  function toggle() {
    if (running) { abortFlag = true; return; }
    startSending();
  }

  async function startSending() {
    const url = document.getElementById('urlInput').value.trim();
    const count = parseInt(document.getElementById('countInput').value) || 100;
    const delay = parseInt(document.getElementById('delayInput').value) || 300;

    if (!url) { document.getElementById('urlInput').focus(); return; }
    try { new URL(url); } catch { setStatus('Invalid URL.', 'err'); return; }

    running = true; abortFlag = false; bestMethod = null;
    sent = 0; success = 0; failed = 0; target = count; startTime = Date.now();

    document.getElementById('statsCard').style.display = 'block';
    document.getElementById('logCard').classList.add('visible');
    document.getElementById('logEntries').innerHTML = '';
    document.getElementById('mainBtn').textContent = '⏹ STOP';
    document.getElementById('mainBtn').classList.add('stop');
    setStatus('🔍 Finding best method...', 'warn');

    for (let i = 0; i < count; i++) {
      if (abortFlag) break;
      await sendOne(url, i + 1);
      await sleep(delay);
    }

    running = false; abortFlag = false;
    document.getElementById('mainBtn').textContent = '⚡ SEND VIEWS';
    document.getElementById('mainBtn').classList.remove('stop');
    setStatus(
      success > 0 ? `✓ Done! ${success} views delivered.` : `✗ Could not reach server. Check URL.`,
      success > 0 ? 'ok' : 'err'
    );
    addLog('— Complete —', 'info');
  }

  async function sendOne(url, num) {
    const ts = new Date().toTimeString().slice(0,8);
    const sep = url.includes('?') ? '&' : '?';
    const bust = `${url}${sep}_t=${Date.now()}&_n=${num}&_r=${Math.random().toString(36).slice(2)}`;

    // Use cached best method if available
    if (bestMethod !== null) {
      const ok = await tryMethod(bestMethod, bust, num, ts);
      if (ok) return;
      bestMethod = null; // reset if failed
    }

    // Try direct no-cors fetch first
    try {
      await fetch(bust, { method: 'GET', mode: 'no-cors', cache: 'no-cache' });
      bestMethod = -1;
      markSuccess(num, 'direct', ts);
      if (success === 1) setStatus('✓ Connected! Sending views...', 'ok');
      return;
    } catch(e) {}

    // Try each proxy
    for (let i = 0; i < PROXIES.length; i++) {
      if (abortFlag) break;
      try {
        const res = await fetch(PROXIES[i](bust), {
          cache: 'no-cache',
          signal: AbortSignal.timeout(5000)
        });
        if (res.status < 500) {
          bestMethod = i;
          markSuccess(num, `proxy-${i+1}`, ts);
          if (success === 1) setStatus(`✓ Connected via proxy ${i+1}!`, 'ok');
          return;
        }
      } catch(e) {}
    }

    // Beacon
    try {
      if (navigator.sendBeacon(bust)) {
        bestMethod = -2;
        markSuccess(num, 'beacon', ts);
        return;
      }
    } catch(e) {}

    // XHR
    const xhrOk = await new Promise(res => {
      try {
        const x = new XMLHttpRequest();
        x.open('GET', bust, true);
        x.timeout = 4000;
        x.onload = () => res(true);
        x.onerror = () => res(false);
        x.ontimeout = () => res(false);
        x.send();
      } catch(e) { res(false); }
    });
    if (xhrOk) { bestMethod = -3; markSuccess(num, 'xhr', ts); return; }

    // Image ping — always sends a real HTTP request
    await new Promise(res => {
      const img = new Image();
      let done = false;
      const fin = () => { if(done) return; done=true; bestMethod=-4; markSuccess(num,'img-ping',ts); res(); };
      img.onload = fin; img.onerror = fin;
      setTimeout(fin, 4000);
      img.src = bust;
    });
  }

  async function tryMethod(m, url, num, ts) {
    try {
      if (m === -1) {
        await fetch(url, { method:'GET', mode:'no-cors', cache:'no-cache' });
        markSuccess(num,'direct',ts); return true;
      }
      if (m === -2) {
        if (navigator.sendBeacon(url)) { markSuccess(num,'beacon',ts); return true; }
      }
      if (m === -3) {
        return await new Promise(res => {
          const x = new XMLHttpRequest();
          x.open('GET',url,true); x.timeout=4000;
          x.onload=()=>{markSuccess(num,'xhr',ts);res(true);};
          x.onerror=()=>res(false); x.ontimeout=()=>res(false); x.send();
        });
      }
      if (m === -4) {
        return await new Promise(res => {
          const img=new Image(); let done=false;
          const fin=()=>{if(done)return;done=true;markSuccess(num,'img-ping',ts);res(true);};
          img.onload=fin; img.onerror=fin; setTimeout(()=>{if(!done){done=true;res(false);}},4000);
          img.src=url;
        });
      }
      if (m >= 0) {
        const r = await fetch(PROXIES[m](url),{cache:'no-cache',signal:AbortSignal.timeout(5000)});
        if (r.status<500){markSuccess(num,`proxy-${m+1}`,ts);return true;}
      }
    } catch(e) {}
    return false;
  }

  function markSuccess(num, method, ts) {
    sent++; success++; updateUI();
    addLog(`#${num} ✓ delivered`, 'ok', ts, method);
  }

  function updateUI() {
    const b = document.getElementById('bigNumber');
    b.textContent = sent.toLocaleString();
    b.classList.add('flash');
    setTimeout(()=>b.classList.remove('flash'),80);
    document.getElementById('successVal').textContent = success.toLocaleString();
    document.getElementById('failVal').textContent = failed.toLocaleString();
    const elapsed = (Date.now()-startTime)/1000;
    document.getElementById('rateVal').textContent = elapsed>0?(sent/elapsed).toFixed(1):'0';
    document.getElementById('progressBar').style.width = Math.min((sent/target)*100,100)+'%';
  }

  function addLog(msg, type='ok', ts='', method='') {
    if (!ts) ts = new Date().toTimeString().slice(0,8);
    const c = document.getElementById('logEntries');
    const e = document.createElement('div');
    e.className = 'log-entry';
    const cls = type==='ok'?'log-ok':type==='err'?'log-err':type==='warn'?'log-warn':'';
    const badge = method?`<span class="badge">${method}</span>`:'';
    e.innerHTML = `<span class="${cls}">${msg}${badge}</span><span class="log-ts">${ts}</span>`;
    c.appendChild(e);
    c.parentElement.scrollTop = c.parentElement.scrollHeight;
  }

  function setStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status'+(type?' '+type:'');
  }

  function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
</script>
</body>
</html>
